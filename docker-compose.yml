services:
  web:
    build: .
    ports:
      - "9000:80"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      DB_HOST: db
      DB_NAME: social9
      DB_USER: root
      DB_PASS: social9_dev
      APP_URL: http://localhost:9000
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: social9_dev
      MYSQL_DATABASE: social9
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  vendor_data:
